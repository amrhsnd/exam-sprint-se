<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#39b54a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Exam Sprint">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Exam Sprint</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icon.svg">
    <link rel="stylesheet" href="./styles.css?v=20260720-economics-set-2-v1">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="title-block">
          <p class="eyebrow" id="courseLabel">Smart Environments</p>
          <h1>Exam Sprint</h1>
        </div>
        <div class="topbar-actions">
          <div class="stat-grid" aria-label="Study stats">
            <div class="stat">
              <span>Covered</span>
              <strong id="coveredValue">0/0</strong>
            </div>
            <div class="stat">
              <span>Answered</span>
              <strong id="answeredValue">0</strong>
            </div>
            <div class="stat">
              <span>Review</span>
              <strong id="reviewValue">0</strong>
            </div>
          </div>
          <div id="userArea" class="user-area"></div>
        </div>
      </header>

      <main>
        <section id="lessonPanel" class="view-panel is-active" aria-live="polite"></section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["\\(", "\\)"], ["$", "$"]],
          displayMath: [["\\[", "\\]"]],
          processEscapes: true
        },
        startup: {
          typeset: false
        }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" defer></script>
    <script src="./app.js?v=20260720-basic-pass-exam-v1" defer></script>
  </body>
</html>
