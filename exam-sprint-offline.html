<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#39b54a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Exam Sprint">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Exam Sprint</title>
    <style>
:root {
  --bg: #f5fbf3;
  --panel: #ffffff;
  --ink: #102017;
  --muted: #5d7164;
  --line: #dbe9dc;
  --green: #39b54a;
  --green-dark: #248a33;
  --blue: #1d7fd6;
  --orange: #f49b29;
  --red: #d94b45;
  --body-bg:
    radial-gradient(circle at top left, rgba(57, 181, 74, 0.16), transparent 34rem),
    linear-gradient(180deg, #f7fff5 0%, #eef8ee 100%);
  --soft-panel: #fbfffa;
  --control-bg: #ffffff;
  --track-bg: #deeadf;
  --choice-border: #cfe3d0;
  --math-bg: #ffffff;
  --math-ink: #111c14;
  --soft-button: #edf5ee;
  --success-bg: #e7f8e8;
  --success-panel: #ecfaed;
  --success-border: #b9e8bf;
  --warning-bg: #fff0d3;
  --warning-ink: #7b4b00;
  --danger-bg: #ffe8e6;
  --danger-panel: #fff0ee;
  --danger-border: #f0c1bd;
  --shadow: 0 12px 30px rgba(27, 71, 34, 0.12);
  color-scheme: light;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

:root[data-theme="dark"] {
  --bg: #07110b;
  --panel: #111d15;
  --ink: #edf7ee;
  --muted: #a9b8ad;
  --line: #26382b;
  --green: #47c75a;
  --green-dark: #8fe69b;
  --blue: #6db7ff;
  --orange: #f6bd62;
  --red: #ff746e;
  --body-bg:
    radial-gradient(circle at top left, rgba(71, 199, 90, 0.13), transparent 30rem),
    linear-gradient(180deg, #08150c 0%, #050b07 100%);
  --soft-panel: #15251a;
  --control-bg: #0d1711;
  --track-bg: #243426;
  --choice-border: #31503a;
  --math-bg: #0a140e;
  --math-ink: #edf7ee;
  --soft-button: #1a2a1f;
  --success-bg: #17351d;
  --success-panel: #122b18;
  --success-border: #2f6e39;
  --warning-bg: #382916;
  --warning-ink: #ffd28a;
  --danger-bg: #3a1d1b;
  --danger-panel: #2d1715;
  --danger-border: #74342f;
  --shadow: 0 16px 34px rgba(0, 0, 0, 0.34);
  color-scheme: dark;
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
  background: var(--bg);
}

body {
  min-height: 100%;
  margin: 0;
  color: var(--ink);
  background: var(--body-bg);
}

button,
input,
select {
  font: inherit;
}

button {
  border: 0;
  cursor: pointer;
}

.app-shell {
  width: min(100%, 760px);
  min-height: 100vh;
  margin: 0 auto;
  padding: max(16px, env(safe-area-inset-top)) 14px calc(24px + env(safe-area-inset-bottom));
}

.topbar {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: start;
  margin-bottom: 12px;
}

.title-block h1 {
  margin: 0;
  font-size: clamp(1.6rem, 8vw, 2.35rem);
  line-height: 0.95;
  letter-spacing: 0;
}

.eyebrow,
.small-label {
  display: block;
  margin: 0 0 4px;
  color: var(--muted);
  font-size: 0.76rem;
  font-weight: 800;
  text-transform: uppercase;
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(52px, 1fr));
  gap: 6px;
}

.topbar-actions {
  display: grid;
  gap: 8px;
  justify-items: end;
}

.user-area {
  display: flex;
  min-height: 32px;
  gap: 6px;
  align-items: center;
  justify-content: flex-end;
}

.theme-toggle,
.topbar-btn {
  min-height: 32px;
  padding: 0 9px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--muted);
  background: var(--control-bg);
  font-size: 0.74rem;
  font-weight: 850;
}

.topbar-btn {
  color: var(--green-dark);
  background: var(--success-bg);
}

.stat {
  min-width: 54px;
  padding: 8px 7px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: color-mix(in srgb, var(--control-bg) 88%, transparent);
  text-align: center;
}

.stat span {
  display: block;
  color: var(--muted);
  font-size: 0.68rem;
  font-weight: 800;
  text-transform: uppercase;
}

.stat strong {
  display: block;
  margin-top: 2px;
  font-size: 1rem;
}

.lesson-track {
  overflow: hidden;
  width: 100%;
  height: 12px;
  border-radius: 999px;
  background: var(--track-bg);
}

.lesson-track span {
  display: block;
  width: 0;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--green), #8ed94a);
  transition: width 220ms ease;
}

.view-panel {
  animation: rise 180ms ease-out;
}

.lesson-card,
.summary-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: var(--shadow);
}

.lesson-card {
  overflow: hidden;
}

.lesson-head {
  display: grid;
  gap: 10px;
  padding: 14px;
  border-bottom: 1px solid var(--line);
  background: var(--soft-panel);
}

.lesson-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  align-items: center;
}

.pill {
  display: inline-flex;
  align-items: center;
  min-height: 26px;
  padding: 5px 9px;
  border-radius: 999px;
  color: var(--green-dark);
  background: var(--success-bg);
  font-size: 0.76rem;
  font-weight: 850;
}

.pill.priority {
  color: var(--warning-ink);
  background: var(--warning-bg);
}

.pill.weak {
  color: var(--red);
  background: var(--danger-bg);
}

.lesson-progress {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  align-items: center;
}

.lesson-progress span:last-child {
  color: var(--muted);
  font-size: 0.82rem;
  font-weight: 850;
}

.card-body {
  display: grid;
  gap: 16px;
  padding: 18px 16px 16px;
}

.prompt {
  margin: 0;
  font-size: clamp(1.25rem, 6.2vw, 2rem);
  font-weight: 900;
  line-height: 1.14;
  letter-spacing: 0;
}

.prompt-with-math {
  display: grid;
  gap: 12px;
}

.subprompt {
  margin: 0;
  color: var(--muted);
  font-size: 0.98rem;
  line-height: 1.42;
}

.choice-grid {
  display: grid;
  gap: 10px;
}

.choice-btn,
.primary-btn,
.secondary-btn,
.danger-btn,
.plain-btn,
.grade-btn {
  min-height: 48px;
  border-radius: 8px;
  font-weight: 850;
  transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
}

.choice-btn {
  padding: 13px 14px;
  border: 2px solid var(--choice-border);
  color: var(--ink);
  background: var(--control-bg);
  text-align: left;
  line-height: 1.32;
}

.choice-btn:active,
.primary-btn:active,
.secondary-btn:active,
.danger-btn:active,
.plain-btn:active,
.grade-btn:active {
  transform: scale(0.985);
}

.choice-btn.is-correct {
  border-color: var(--green);
  background: var(--success-bg);
}

.choice-btn.is-wrong {
  border-color: var(--red);
  background: var(--danger-bg);
}

.type-box {
  display: grid;
  gap: 10px;
}

.type-box input {
  min-height: 52px;
  width: 100%;
  border: 2px solid var(--choice-border);
  border-radius: 8px;
  padding: 12px 14px;
  color: var(--ink);
  background: var(--control-bg);
  font-weight: 800;
}

.type-box input:focus {
  border-color: var(--green);
  outline: 3px solid rgba(57, 181, 74, 0.18);
}

.answer-panel {
  display: grid;
  gap: 10px;
  padding: 13px;
  border-radius: 8px;
  background: var(--soft-panel);
  border: 1px solid var(--line);
}

.answer-panel.correct {
  border-color: var(--success-border);
  background: var(--success-panel);
}

.answer-panel.wrong {
  border-color: var(--danger-border);
  background: var(--danger-panel);
}

.answer-main {
  margin: 0;
  font-size: 1.02rem;
  font-weight: 850;
  line-height: 1.36;
}

.answer-explanation {
  margin: 0;
  color: var(--muted);
  line-height: 1.45;
}

.math-block,
.math-inline {
  font-family: ui-serif, Georgia, "Times New Roman", serif;
  font-weight: 700;
  letter-spacing: 0;
}

.math-block {
  overflow-x: auto;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--math-bg);
  color: var(--math-ink);
  font-size: clamp(1.15rem, 5.4vw, 1.65rem);
  line-height: 1.55;
}

.math-inline {
  display: inline-block;
  max-width: 100%;
  font-size: 1.06em;
  line-height: 1.35;
}

.choice-content {
  display: grid;
  gap: 6px;
}

.frac {
  display: inline-grid;
  grid-template-rows: auto auto;
  align-items: center;
  justify-items: center;
  margin: 0 0.12em;
  vertical-align: middle;
}

.frac > span:first-child {
  min-width: 100%;
  padding: 0 0.22em 0.08em;
  border-bottom: 1.8px solid currentColor;
  text-align: center;
}

.frac > span:last-child {
  padding: 0.08em 0.22em 0;
  text-align: center;
}

.root {
  display: inline-flex;
  gap: 0.08em;
  align-items: baseline;
}

.button-row,
.grade-row {
  display: grid;
  gap: 10px;
}

.button-row {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.grade-row {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.primary-btn {
  color: #ffffff;
  background: var(--green);
}

.secondary-btn {
  color: var(--green-dark);
  background: var(--success-bg);
}

.danger-btn {
  color: #ffffff;
  background: var(--red);
}

.plain-btn {
  color: var(--muted);
  background: var(--soft-button);
}

.grade-btn {
  padding: 10px 8px;
  color: var(--ink);
  background: var(--soft-button);
}

.grade-btn[data-grade="wrong"] {
  color: var(--red);
  background: var(--danger-bg);
}

.grade-btn[data-grade="unsure"] {
  color: var(--warning-ink);
  background: var(--warning-bg);
}

.grade-btn[data-grade="correct"] {
  color: var(--green-dark);
  background: var(--success-bg);
}

.summary-card {
  display: grid;
  gap: 16px;
  padding: 18px 16px;
}

.summary-card h2 {
  margin: 0;
  font-size: 1.65rem;
}

.exam-picker {
  gap: 12px;
}

.exam-list {
  display: grid;
  gap: 10px;
}

.exam-option {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: center;
  min-height: 76px;
  padding: 13px 12px;
  border: 2px solid var(--choice-border);
  border-radius: 8px;
  color: var(--ink);
  background: var(--control-bg);
  text-align: left;
}

.exam-option:not(:disabled):active {
  transform: scale(0.99);
}

.exam-option:disabled {
  cursor: not-allowed;
  opacity: 0.62;
}

.exam-option strong,
.exam-option small {
  display: block;
}

.exam-option strong {
  font-size: 1rem;
}

.exam-option small {
  margin-top: 4px;
  color: var(--muted);
  line-height: 1.32;
}

.exam-option em {
  padding: 5px 8px;
  border-radius: 999px;
  color: var(--green-dark);
  background: var(--success-bg);
  font-size: 0.72rem;
  font-style: normal;
  font-weight: 850;
  white-space: nowrap;
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.summary-tile {
  padding: 12px 8px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--soft-panel);
  text-align: center;
}

.summary-tile span {
  display: block;
  color: var(--muted);
  font-size: 0.72rem;
  font-weight: 800;
  text-transform: uppercase;
}

.summary-tile strong {
  display: block;
  margin-top: 5px;
  font-size: 1.25rem;
}

.empty-state {
  padding: 22px 16px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--control-bg);
  color: var(--muted);
  line-height: 1.45;
}

.toast {
  position: fixed;
  right: 16px;
  bottom: calc(18px + env(safe-area-inset-bottom));
  left: 16px;
  z-index: 20;
  max-width: 420px;
  margin: 0 auto;
  padding: 12px 14px;
  border-radius: 8px;
  color: #ffffff;
  background: rgba(16, 32, 23, 0.94);
  box-shadow: var(--shadow);
  opacity: 0;
  pointer-events: none;
  transform: translateY(8px);
  transition: opacity 160ms ease, transform 160ms ease;
}

.toast.is-visible {
  opacity: 1;
  transform: translateY(0);
}

@keyframes rise {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (min-width: 640px) {
  .app-shell {
    padding-right: 22px;
    padding-left: 22px;
  }

  .button-row {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 430px) {
  .topbar {
    grid-template-columns: 1fr;
  }

  .topbar-actions,
  .user-area {
    justify-items: stretch;
    justify-content: stretch;
  }

  .stat-grid {
    grid-template-columns: repeat(3, 1fr);
  }

  .grade-row {
    grid-template-columns: 1fr;
  }
}

</style>

  <body>
    <div class="app-shell">
      <header class="topbar">

          <p class="eyebrow" id="courseLabel">Smart Environments</p>
          <h1>Exam Sprint</h1>
        </div>
        <div class="topbar-actions">
          <div class="stat-grid" aria-label="Study stats">
            <div class="stat">
              <span>Covered</span>
              <strong id="coveredValue">0/0</strong>
            </div>
            <div class="stat">
              <span>Answered</span>
              <strong id="answeredValue">0</strong>
            </div>
            <div class="stat">
              <span>Review</span>
              <strong id="reviewValue">0</strong>
            </div>
          </div>
          <div id="userArea" class="user-area"></div>
        </div>
      </header>

      <main>
        <section id="lessonPanel" class="view-panel is-active" aria-live="polite"></section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script>window.EXAM_SPRINT_EXAMS=[{"id":"smart-environments","title":"Smart Environments","description":"Original exam sprint bank from the last exam.","dataUrl":"./data/se_duolingo_quiz_data.json","status":"ready"},{"id":"economics-computation","title":"Economics and Computation","description":"Mechanism design, computational game theory, selfish routing, and no-regret learning review bank.","dataUrl":"./data/economics_computation_exam_questions.json","status":"ready"},{"id":"economics-computation-set-2","title":"Economics and Computation — Set 2","description":"100 fresh exam-style questions covering calculations, proof steps, counterexamples, theorem selection, and cross-topic discrimination.","dataUrl":"./data/economics_computation_exam_questions_set_2.json","status":"ready"},{"id":"economics-computation-basic-pass","title":"Economics and Computation — Basic Pass","description":"90 foundational, high-yield questions for relearning the core definitions, formulas, theorems, and standard examples.","dataUrl":"./data/economics_computation_basic_pass_question_bank.json","status":"ready"},{"id":"economics-computation-mc-pass","title":"Economics and Computation — MC Pass","description":"90 multiple-choice, pass-focused questions covering core definitions, formulas, theorems, standard examples, and common exam distinctions.","dataUrl":"./data/economics_computation_mc_pass_question_bank.json","status":"ready"},{"id":"new-exam","title":"New Exam","description":"Add this exam's question JSON when the material is ready.","dataUrl":"./data/new_exam_quiz_data.json","status":"draft"}];window.EXAM_SPRINT_DATA_BY_URL={"./data/se_duolingo_quiz_data.json":{"metadata":{"title":"Smart Environments Exam Quiz Data","version":"1.0","created_for":"Duolingo-style rapid review app","study_mode":"short active recall, formulas, cloze, multiple choice","estimated_use":"3-hour emergency exam preparation","sources":["Se.pdf handwritten notes","01_SE_Intro.pdf","02_SE_Applications.pdf","03_SE_Communications.pdf","04_SE_Low_Power_Standards.ppt.pdf","05_SE_VANET_Communications.pdf","06_Applications_Reordered.pdf","lect01_SE_sampling1D.pdf","lect02_SE_Part1.pdf","lect02_SE_Part2_sampling2D.pdf","lect03_3D.pdf","lect04_SE_sourcecoding.pdf","lect05_notes.pdf"],"card_priority_meaning":{"1":"must memorize","2":"high-yield concept","3":"supporting detail"},"counts":{"formula_cards":23,"concept_cards":123,"multiple_choice_cards":10,"cloze_cards":10,"exam_sentences":20,"total_cards":166},"added_question_bank_count":1000},"formula_cards":[{"id":"F001","deck":"formulas_sampling","priority":1,"front":"Sampling period formula","back":"T_s = 1 / f_s","latex":"T_s=\\frac{1}{f_s}","explanation":"Sampling period is the time between samples; it is the reciprocal of sampling frequency.","tags":["sampling","ADC","must_memorize"]},{"id":"F002","deck":"formulas_sampling","priority":1,"front":"Nyquist condition","back":"f_s ≥ 2W","latex":"f_s \\ge 2W","explanation":"To reconstruct a band-limited signal, sample at least twice the maximum frequency W.","tags":["sampling","nyquist","aliasing","must_memorize"]},{"id":"F003","deck":"formulas_sampling","priority":1,"front":"What is W in f_s ≥ 2W?","back":"W is the highest frequency component in the signal.","latex":"W=f_{\\max}","explanation":"If the fastest component is 5 kHz, then W = 5 kHz and minimum f_s = 10 kHz.","tags":["sampling","nyquist"]},{"id":"F004","deck":"formulas_fourier","priority":1,"front":"Continuous-time Fourier transform","back":"X(f) = ∫ x(t)e^{-j2πft} dt over all time","latex":"X(f)=\\int_{-\\infty}^{+\\infty} x(t)e^{-j2\\pi f t}\\,dt","explanation":"Represents a signal as a weighted sum of complex sinusoids.","tags":["fourier","frequency","must_memorize"]},{"id":"F005","deck":"formulas_fourier","priority":1,"front":"What is j in the Fourier transform?","back":"j = sqrt(-1), the imaginary unit used in engineering.","latex":"j=\\sqrt{-1}","explanation":"Engineers use j instead of i because i is often used for current.","tags":["fourier","complex"]},{"id":"F006","deck":"formulas_sampling","priority":1,"front":"sinc definition used in the notes","back":"sinc(x) = sin(x) / x","latex":"\\operatorname{sinc}(x)=\\frac{\\sin x}{x}","explanation":"Because this convention lacks π inside sinc, the reconstruction argument should include π.","tags":["sinc","reconstruction"]},{"id":"F007","deck":"formulas_sampling","priority":1,"front":"Ideal reconstruction formula using sinc(x)=sin(x)/x","back":"x(t)=Σ x(nT_s) sinc((π/T_s)(t-nT_s))","latex":"x(t)=\\sum_{n=-\\infty}^{+\\infty} x(nT_s)\\operatorname{sinc}\\!\\left(\\frac{\\pi}{T_s}(t-nT_s)\\right)","explanation":"Continuous signal reconstructed as a sum of shifted sinc interpolation functions.","tags":["sampling","reconstruction","sinc","must_memorize"]},{"id":"F008","deck":"formulas_quantization","priority":1,"front":"Number of quantization levels from B bits","back":"L = 2^B","latex":"L=2^B","explanation":"B bits can represent 2^B amplitude levels.","tags":["quantization","ADC","must_memorize"]},{"id":"F009","deck":"formulas_quantization","priority":1,"front":"Quantization step size for range [-A, A]","back":"Δ = 2A / L = 2A / 2^B","latex":"\\Delta=\\frac{2A}{L}=\\frac{2A}{2^B}","explanation":"Δ is the spacing between neighboring quantization levels.","tags":["quantization","delta","must_memorize"]},{"id":"F010","deck":"formulas_quantization","priority":1,"front":"Uniform quantization error interval","back":"e ∈ [-Δ/2, Δ/2]","latex":"e\\in\\left[-\\frac{\\Delta}{2},\\frac{\\Delta}{2}\\right]","explanation":"With rounding to nearest level, the maximum absolute error is half a quantization step.","tags":["quantization","error"]},{"id":"F011","deck":"formulas_quantization","priority":1,"front":"Mean square quantization error","back":"MSE = D ≈ Δ² / 12","latex":"\\mathrm{MSE}=D\\approx\\frac{\\Delta^2}{12}","explanation":"For uniform quantization error, distortion is proportional to the square of the step size.","tags":["quantization","MSE","distortion","must_memorize"]},{"id":"F012","deck":"formulas_rate_distortion","priority":1,"front":"Rate-distortion approximation from notes","back":"D = σ_x² / 2^{2B}","latex":"D=\\frac{\\sigma_x^2}{2^{2B}}","explanation":"More bits B reduce distortion exponentially.","tags":["rate_distortion","quantization","must_memorize"]},{"id":"F013","deck":"formulas_rate_distortion","priority":1,"front":"Bits needed for distortion D","back":"B ≈ 1/2 log₂(σ_x² / D)","latex":"B\\approx\\frac{1}{2}\\log_2\\!\\left(\\frac{\\sigma_x^2}{D}\\right)","explanation":"If desired distortion D decreases, required bits B increase.","tags":["rate_distortion","bits","must_memorize"]},{"id":"F014","deck":"formulas_graphs","priority":1,"front":"Degree matrix formula","back":"D_ii = Σ_j A_ij","latex":"D_{ii}=\\sum_j A_{ij}","explanation":"The degree of a node is the sum of its adjacency weights.","tags":["graphs","degree_matrix"]},{"id":"F015","deck":"formulas_graphs","priority":1,"front":"Graph Laplacian","back":"L = D − A","latex":"L=D-A","explanation":"The graph Laplacian describes graph connectivity.","tags":["graphs","laplacian","must_memorize"]},{"id":"F016","deck":"formulas_eigen","priority":1,"front":"Eigenvector equation","back":"A v = λ v","latex":"A v=\\lambda v","explanation":"When A acts on eigenvector v, it only scales it by eigenvalue λ.","tags":["eigenvectors","PCA","graph_fourier","must_memorize"]},{"id":"F017","deck":"formulas_graph_fourier","priority":1,"front":"Graph Fourier Transform","back":"x_hat = U^T x","latex":"\\hat{x}=U^{T}x","explanation":"Projects a graph signal onto the Laplacian eigenvector basis.","tags":["graph_fourier","graphs","must_memorize"]},{"id":"F018","deck":"formulas_graph_fourier","priority":1,"front":"Inverse Graph Fourier Transform","back":"x = U x_hat","latex":"x=U\\hat{x}","explanation":"Reconstructs the graph signal from graph-frequency coefficients.","tags":["graph_fourier","graphs"]},{"id":"F019","deck":"formulas_camera_lidar","priority":1,"front":"Pinhole camera projection","back":"x = fX/Z, y = fY/Z","latex":"x=f\\frac{X}{Z},\\quad y=f\\frac{Y}{Z}","explanation":"A 3D point projects to a 2D image; increasing depth Z makes the projection smaller.","tags":["camera_model","3D","projection"]},{"id":"F020","deck":"formulas_camera_lidar","priority":1,"front":"LiDAR time-of-flight distance","back":"d = ct / 2","latex":"d=\\frac{ct}{2}","explanation":"Divide by 2 because the light travels to the object and back.","tags":["lidar","3D","distance"]},{"id":"F021","deck":"formulas_convolution","priority":1,"front":"Discrete convolution","back":"y[n] = Σ_k x[k]h[n−k]","latex":"y[n]=\\sum_k x[k]\\,h[n-k]","explanation":"Convolution computes weighted sums of neighboring signal values.","tags":["convolution","filtering"]},{"id":"F022","deck":"formulas_convolution","priority":1,"front":"Convolution theorem","back":"x*h in time/space corresponds to X(f)H(f) in frequency.","latex":"x*h\\Longleftrightarrow X(f)H(f)","explanation":"Filtering by convolution becomes multiplication in the frequency domain.","tags":["convolution","fourier","filtering","must_memorize"]},{"id":"F023","deck":"formulas_lora","priority":1,"front":"LoRa symbol time","back":"T_s = 2^SF / BW","latex":"T_s=\\frac{2^{\\mathrm{SF}}}{\\mathrm{BW}}","explanation":"Higher spreading factor means longer symbol time and lower bitrate, but better sensitivity/range.","tags":["LoRa","spreading_factor","LPWAN","must_memorize"]}],"concept_cards":[{"id":"C001","deck":"01_SE_Intro","priority":1,"front":"Define a smart environment.","back":"A physical environment enriched with sensors, actuators, computation, and communication so it can monitor conditions, process data, decide, and act.","tags":["smart_environment","definition"]},{"id":"C002","deck":"01_SE_Intro","priority":1,"front":"Smart flow: put the chain in order.","back":"Sensors → data/database → information processing → decision algorithms → services/actuators → physical environment.","tags":["smart_flow","data_path"]},{"id":"C003","deck":"01_SE_Intro","priority":1,"front":"What are smart devices?","back":"Small autonomous networked devices that interact with the physical world, humans, or other devices.","tags":["smart_devices","IoT"]},{"id":"C004","deck":"01_SE_Intro","priority":1,"front":"Define IoT.","back":"A network of physical objects embedded with sensors, electronics, software, and connectivity, enabling them to collect/exchange data and receive/react to commands.","tags":["IoT","definition"]},{"id":"C005","deck":"01_SE_Intro","priority":1,"front":"Main IoT implementation issues.","back":"Energy constraints, security, privacy, performance/reliability, interoperability, scalability.","tags":["IoT","requirements","must_memorize"]},{"id":"C006","deck":"01_SE_Intro","priority":2,"front":"What does 'Anything + Communications = Smart Anything' mean?","back":"Adding sensing/communication/processing to ordinary objects turns them into smart applications such as smart homes, smart cars, or smart healthcare.","tags":["IoT","applications"]},{"id":"C007","deck":"01_SE_Intro","priority":1,"front":"Data path elements in smart environments.","back":"Data acquisition, local data processing, data communication, data stream, data storage/cloud, data analytics.","tags":["data_path","must_memorize"]},{"id":"C008","deck":"01_SE_Intro","priority":2,"front":"Data acquisition concerns.","back":"Sensor design/embedding, density, accuracy, tunability, energy efficiency, cost, privacy, environmental concerns.","tags":["data_acquisition"]},{"id":"C009","deck":"01_SE_Intro","priority":2,"front":"Local data processing tradeoff.","back":"Balance local vs remote processing and computation vs communication; local processing can reduce data transmission but consumes processing energy.","tags":["local_processing","tradeoff"]},{"id":"C010","deck":"01_SE_Intro","priority":2,"front":"Data communication QoS requirements.","back":"Reliability, latency, throughput, security, energy efficiency, mobility, architecture, range/coverage, bandwidth.","tags":["communication","QoS"]},{"id":"C011","deck":"01_SE_Intro","priority":2,"front":"What is context/location awareness useful for?","back":"It allows devices to infer user activity/location and adapt information content and distribution.","tags":["context_awareness","mobility"]},{"id":"C012","deck":"02_SE_Applications","priority":1,"front":"Long-range IoT technology families.","back":"Non-3GPP: LoRa, Sigfox, Weightless, others. 3GPP: LTE-M, EC-GSM, NB-IoT, 5G.","tags":["applications","LPWAN","3GPP"]},{"id":"C013","deck":"02_SE_Applications","priority":2,"front":"Examples of smart city applications.","back":"Adaptive traffic lights, multiservice public lighting, smart bins, people-flow sensing, pollution monitoring, building security, structural health monitoring, energy/resource optimization.","tags":["smart_city","applications"]},{"id":"C014","deck":"02_SE_Applications","priority":2,"front":"Road application examples.","back":"Structural health of roads/bridges/tunnels, traffic flow, parking availability, environmental conditions, intelligent parking, EV recharging.","tags":["road_applications","smart_city"]},{"id":"C015","deck":"02_SE_Applications","priority":2,"front":"LoRaWAN smart city use cases in the slides.","back":"Smart metering, smart bins, LoRaWAN signposts, water metering, parking management, smart buildings, edible oil recycling, port logistics.","tags":["LoRaWAN","smart_city"]},{"id":"C016","deck":"02_SE_Applications","priority":2,"front":"Parking monitoring: what data is collected?","back":"Lot occupancy status, time spent on stalls, occupancy times by type and time slot, individual or area-level statistics.","tags":["parking_monitoring","applications"]},{"id":"C017","deck":"02_SE_Applications","priority":2,"front":"Waste management IoT purpose.","back":"Sensors measure container fill levels; digitized data helps route trucks efficiently and supports circular-economy collection.","tags":["waste_management","applications"]},{"id":"C018","deck":"02_SE_Applications","priority":2,"front":"Why intelligent water metering?","back":"Replaces manual reading, reduces water waste, helps utilities/cities manage consumption, and can provide hourly insights.","tags":["water_metering","applications"]},{"id":"C019","deck":"03_SE_Communications","priority":1,"front":"What is a WLAN?","back":"A wireless local area network that uses radio waves as its carrier; usually the last link to users is wireless while backbone is wired.","tags":["WLAN","wireless"]},{"id":"C020","deck":"03_SE_Communications","priority":1,"front":"Elements of a wireless network.","back":"Wireless hosts, base stations/access points, wireless links, and network infrastructure.","tags":["wireless","architecture"]},{"id":"C021","deck":"03_SE_Communications","priority":1,"front":"Infrastructure mode vs ad hoc mode.","back":"Infrastructure: base station connects mobiles to wired network. Ad hoc: no base station; nodes organize and route among themselves.","tags":["wireless","infrastructure","ad_hoc"]},{"id":"C022","deck":"03_SE_Communications","priority":1,"front":"Wireless taxonomy dimensions.","back":"Single-hop vs multi-hop, and infrastructure vs no infrastructure.","tags":["wireless_taxonomy"]},{"id":"C023","deck":"03_SE_Communications","priority":1,"front":"Why are wireless links harder than wired links?","back":"Signal attenuation/path loss, interference from other sources, and multipath propagation.","tags":["wireless","channel"]},{"id":"C024","deck":"03_SE_Communications","priority":1,"front":"SNR and BER relation.","back":"Higher SNR makes it easier to extract the signal and usually decreases BER.","tags":["SNR","BER","must_memorize"]},{"id":"C025","deck":"03_SE_Communications","priority":1,"front":"Given a fixed SNR, how should the physical layer be chosen?","back":"Choose the modulation/rate that meets the BER requirement while giving the highest throughput.","tags":["SNR","modulation","BER"]},{"id":"C026","deck":"03_SE_Communications","priority":1,"front":"High frequency wireless: benefit and drawback.","back":"Higher frequency can support higher data transfer, but obstacles/path loss become more problematic.","tags":["spectrum","frequency"]},{"id":"C027","deck":"03_SE_Communications","priority":1,"front":"Hidden terminal problem.","back":"A and C cannot hear each other but both can interfere at B, so they are unaware of a collision at B.","tags":["hidden_terminal","wireless","must_memorize"]},{"id":"C028","deck":"03_SE_Communications","priority":2,"front":"Physical layer vs data link layer.","back":"Physical layer transmits raw bits. Data link layer manages medium access/collision avoidance such as CSMA/CA.","tags":["layers","MAC"]},{"id":"C029","deck":"03_SE_Communications","priority":2,"front":"What is IEEE?","back":"An organization that creates standards for protocols such as Wi-Fi/802.11.","tags":["IEEE","802.11"]},{"id":"C030","deck":"03_SE_Communications","priority":2,"front":"802.11 radio bands.","back":"Most WLAN products operate in unlicensed bands; 2.4 GHz is common, and 5 GHz is used by 802.11a.","tags":["802.11","spectrum"]},{"id":"C031","deck":"03_SE_Communications","priority":2,"front":"Frequency hopping vs direct sequence spread spectrum.","back":"FH hops carrier frequency according to a known pattern; DS keeps a fixed carrier band and spreads data over a wider frequency range.","tags":["spread_spectrum","FH","DSSS"]},{"id":"C032","deck":"03_SE_Communications","priority":2,"front":"802.11a key properties.","back":"Uses OFDM, operates around 5 GHz, up to 54 Mbps, less interference but shorter range and poorer compatibility with 802.11b.","tags":["802.11a","OFDM"]},{"id":"C033","deck":"03_SE_Communications","priority":2,"front":"802.11b vs 802.11a.","back":"802.11b: 2.4 GHz, DSSS, up to 11 Mbps, longer range. 802.11a: 5 GHz, OFDM, up to 54 Mbps, shorter range.","tags":["802.11a","802.11b"]},{"id":"C034","deck":"03_SE_Communications","priority":2,"front":"802.11g key idea.","back":"High-speed extension to 802.11b: up to 54 Mbps, 2.4 GHz, backward compatible.","tags":["802.11g"]},{"id":"C035","deck":"03_SE_Communications","priority":2,"front":"WEP security services.","back":"Authentication, confidentiality, and integrity, but WEP is vulnerable and uses weak/static keys.","tags":["WEP","security"]},{"id":"C036","deck":"03_SE_Communications","priority":2,"front":"What is a site survey?","back":"A planning activity to define coverage areas, data rates, AP placement, signal strength, SNR, and RF interference.","tags":["site_survey","network_planning"]},{"id":"C037","deck":"04_Low_Power_Standards","priority":1,"front":"Why are communications needed in IoT?","back":"To exchange information between sensors, communicate with a remote sink/cloud, and enable remote control.","tags":["IoT","communication"]},{"id":"C038","deck":"04_Low_Power_Standards","priority":1,"front":"Classical short-range IoT technologies: pros and cons.","back":"Pros: low cost, low power, unlicensed. Cons: limited distance and need for local coordinator/hub/AP.","tags":["IoT","short_range"]},{"id":"C039","deck":"04_Low_Power_Standards","priority":1,"front":"Cellular WAN IoT: pros and cons.","back":"Pros: long range. Cons: higher device cost, complex protocols, licensed spectrum and operation cost.","tags":["cellular","WAN"]},{"id":"C040","deck":"04_Low_Power_Standards","priority":1,"front":"What is LPWAN?","back":"Low-Power Wide Area Network: combines low energy/low cost with long-range coverage for low-rate IoT traffic.","tags":["LPWAN","must_memorize"]},{"id":"C041","deck":"04_Low_Power_Standards","priority":1,"front":"LPWAN requirements.","back":"Long battery life, massive number of devices, extended coverage, low device cost, low deployment cost.","tags":["LPWAN","requirements","must_memorize"]},{"id":"C042","deck":"04_Low_Power_Standards","priority":1,"front":"LPWAN architecture.","back":"End devices communicate to LPWAN gateways; gateways forward over backhaul to network/application servers and cloud/customer IT.","tags":["LPWAN","architecture"]},{"id":"C043","deck":"04_Low_Power_Standards","priority":1,"front":"Available LPWAN technologies.","back":"LoRaWAN, Sigfox, Ingenu RPMA, Weightless/other, and cellular IoT such as LTE-M, NB-IoT, EC-GSM.","tags":["LPWAN","technologies"]},{"id":"C044","deck":"04_Low_Power_Standards","priority":1,"front":"Difference between LoRa and LoRaWAN.","back":"LoRa is the physical modulation/link layer; LoRaWAN is the network protocol/system architecture built on top of LoRa.","tags":["LoRa","LoRaWAN","must_memorize"]},{"id":"C045","deck":"04_Low_Power_Standards","priority":1,"front":"LoRa technology overview.","back":"LoRaWAN is LPWAN; LoRa uses Chirp Spread Spectrum, typical 125 kHz bandwidth, high sensitivity, long range, good indoor penetration.","tags":["LoRa","CSS","must_memorize"]},{"id":"C046","deck":"04_Low_Power_Standards","priority":1,"front":"What is a chirp?","back":"A frequency-modulated pulse whose frequency changes monotonically during its duration: up-chirp rises, down-chirp falls.","tags":["chirp","LoRa","CSS"]},{"id":"C047","deck":"04_Low_Power_Standards","priority":1,"front":"How does LoRa encode bits?","back":"Information is encoded by shifting chirps in time/frequency slots; the number of possible shifts depends on the spreading factor.","tags":["LoRa","chirp","modulation"]},{"id":"C048","deck":"04_Low_Power_Standards","priority":1,"front":"What does increasing spreading factor do?","back":"Increases sensitivity and range/penetration but decreases bitrate and increases time-on-air/energy/collision risk.","tags":["LoRa","spreading_factor","tradeoff","must_memorize"]},{"id":"C049","deck":"04_Low_Power_Standards","priority":1,"front":"LoRa SF7 vs SF12.","back":"SF7: higher bitrate, lower sensitivity, for close/good signal. SF12: lower bitrate, higher sensitivity, for far/deep-indoor/poor signal.","tags":["LoRa","spreading_factor"]},{"id":"C050","deck":"04_Low_Power_Standards","priority":1,"front":"LoRaWAN and ALOHA.","back":"LoRaWAN behavior is close to pure ALOHA; channel capacity usage is limited and collisions can drop many packets under load.","tags":["LoRaWAN","ALOHA","collisions"]},{"id":"C051","deck":"04_Low_Power_Standards","priority":1,"front":"LoRaWAN Class A.","back":"Device listens only after its own uplink transmission; most energy-efficient; suitable for battery devices with no latency constraint.","tags":["LoRaWAN","classes","must_memorize"]},{"id":"C052","deck":"04_Low_Power_Standards","priority":1,"front":"LoRaWAN Class B.","back":"Device opens scheduled receive windows synchronized by beacons; optimized energy with bounded latency.","tags":["LoRaWAN","classes"]},{"id":"C053","deck":"04_Low_Power_Standards","priority":1,"front":"LoRaWAN Class C.","back":"Device is almost always listening except during transmissions; lowest latency but high power use, suitable for grid-powered devices.","tags":["LoRaWAN","classes"]},{"id":"C054","deck":"04_Low_Power_Standards","priority":2,"front":"LoRaWAN activation methods.","back":"ABP: fixed addresses/keys, simple but vulnerable after reset. OTAA: join procedure with new session keys, supports roaming.","tags":["LoRaWAN","security","activation"]},{"id":"C055","deck":"04_Low_Power_Standards","priority":1,"front":"Sigfox key properties.","back":"First LPWAN; ultra-narrowband, proprietary, low throughput (~100 bps), low power, long range, 140 messages/day/device, subscription/cloud model.","tags":["Sigfox","LPWAN"]},{"id":"C056","deck":"04_Low_Power_Standards","priority":1,"front":"Main difference: LoRaWAN vs Sigfox gateways.","back":"With LoRaWAN you can deploy your own gateways; Sigfox is a proprietary operator/subscription network.","tags":["Sigfox","LoRaWAN"]},{"id":"C057","deck":"04_Low_Power_Standards","priority":2,"front":"Sigfox payload limits.","back":"Uplink payload is about 12 bytes; downlink payload is about 8 bytes; each uplink message is transmitted 3 times.","tags":["Sigfox","payload"]},{"id":"C058","deck":"04_Low_Power_Standards","priority":1,"front":"Cellular IoT examples.","back":"LTE-M/eMTC, NB-IoT, EC-GSM-IoT.","tags":["cellular_IoT","3GPP"]},{"id":"C059","deck":"04_Low_Power_Standards","priority":1,"front":"LTE-M key idea.","back":"Evolution of LTE optimized for IoT: low power, easy deployment, interoperable with LTE, up to about 1 Mbps, uses legacy cellular infrastructure.","tags":["LTE-M","cellular_IoT"]},{"id":"C060","deck":"04_Low_Power_Standards","priority":2,"front":"NB-IoT key idea.","back":"A 3GPP cellular IoT technology optimized for low-end IoT with narrow bandwidth, low power, and licensed-spectrum QoS.","tags":["NB-IoT","cellular_IoT"]},{"id":"C061","deck":"04_Low_Power_Standards","priority":2,"front":"EC-GSM key idea.","back":"GSM/EDGE enhancements for IoT, leveraging existing GSM coverage, with low data rates and extended coverage.","tags":["EC-GSM","cellular_IoT"]},{"id":"C062","deck":"05_VANET","priority":1,"front":"What is a VANET?","back":"Vehicular Ad Hoc Network: vehicles and roadside units communicate, often without central access points, for safety and traffic applications.","tags":["VANET","definition"]},{"id":"C063","deck":"05_VANET","priority":1,"front":"Why vehicular networks?","back":"Improve safety, reduce congestion/fuel waste, support traffic efficiency, and add high-tech vehicle services.","tags":["VANET","motivation"]},{"id":"C064","deck":"05_VANET","priority":1,"front":"SIVC vs MIVC.","back":"Single-hop IVC is for short-range applications; multihop IVC supports longer-range communication but is more complex.","tags":["VANET","IVC"]},{"id":"C065","deck":"05_VANET","priority":1,"front":"DSRC frequency band.","back":"DSRC uses the 5.9 GHz band, approximately 5.850–5.925 GHz.","tags":["DSRC","802.11p","must_memorize"]},{"id":"C066","deck":"05_VANET","priority":1,"front":"VANET vs MANET: main differences.","back":"Vehicles have high but predictable mobility, dynamic topology, no severe power constraint, and accurate localization via GPS/sensors.","tags":["VANET","MANET"]},{"id":"C067","deck":"05_VANET","priority":2,"front":"VANET operating environment challenges.","back":"Buildings and obstacles, interference, high speed, changing topology, city/highway differences, and 2D road topology.","tags":["VANET","environment"]},{"id":"C068","deck":"05_VANET","priority":2,"front":"Threat model categories.","back":"Attackers can be insider/outsider, malicious/rational, active/passive, local/extended.","tags":["VANET","security"]},{"id":"C069","deck":"05_VANET","priority":2,"front":"VANET attack examples.","back":"Bogus traffic information, intelligent collisions, identity/speed/position cheating, jamming, tunnel, tracking.","tags":["VANET","security"]},{"id":"C070","deck":"05_VANET","priority":1,"front":"DSRC/802.11p physical layer.","back":"Based on IEEE 802.11a ideas, uses OFDM and supports BPSK, QPSK, 16-QAM, 64-QAM with coding rates.","tags":["DSRC","802.11p","physical_layer"]},{"id":"C071","deck":"05_VANET","priority":1,"front":"CSMA/CD vs CSMA/CA.","back":"CSMA/CD detects collisions after they occur; CSMA/CA tries to avoid collisions before transmission, used in wireless.","tags":["CSMA","MAC","must_memorize"]},{"id":"C072","deck":"05_VANET","priority":1,"front":"Why is CSMA/CD unsuitable for wireless?","back":"Wireless nodes cannot reliably detect collisions while transmitting, so collision avoidance is preferred.","tags":["CSMA","wireless"]},{"id":"C073","deck":"05_VANET","priority":1,"front":"Hidden terminal problem in VANET/wireless.","back":"Two nodes cannot hear each other but both can interfere at a receiver, causing collision.","tags":["hidden_terminal","CSMA"]},{"id":"C074","deck":"05_VANET","priority":1,"front":"Exposed terminal problem.","back":"A node unnecessarily refrains from transmitting because it hears a nearby transmission, even though its transmission would not interfere with the intended receiver.","tags":["exposed_terminal","CSMA"]},{"id":"C075","deck":"05_VANET","priority":1,"front":"RTS/CTS purpose.","back":"Request-to-Send/Clear-to-Send handshaking helps reserve the medium and reduce hidden-terminal collisions.","tags":["RTS_CTS","DCF"]},{"id":"C076","deck":"05_VANET","priority":1,"front":"IEEE 802.11 DCF.","back":"Distributed Coordination Function: CSMA/CA-based MAC with contention/backoff and optional RTS/CTS.","tags":["DCF","802.11","MAC"]},{"id":"C077","deck":"05_VANET","priority":2,"front":"Backoff time tradeoff.","back":"High density needs longer backoff to avoid collisions; low density with too long backoff wastes time.","tags":["backoff","CSMA"]},{"id":"C078","deck":"05_VANET","priority":1,"front":"Why broadcast routing in VANETs?","back":"Broadcast spreads traffic warnings such as detour routes, accident alerts, construction warnings, and safety messages.","tags":["broadcast_routing","VANET"]},{"id":"C079","deck":"05_VANET","priority":1,"front":"Broadcast storm.","back":"Contention and collisions caused by excessive/redundant rebroadcasting in a broadcasting network.","tags":["broadcast_storm","VANET"]},{"id":"C080","deck":"05_VANET","priority":1,"front":"Four VANET broadcast strategies.","back":"Probability-based, location-based, neighbor-based, cluster-based.","tags":["broadcast_routing","must_memorize"]},{"id":"C081","deck":"05_VANET","priority":2,"front":"Location-based broadcast strategy.","back":"Selects forwarding nodes based on how much additional area they cover, possibly using position prediction.","tags":["broadcast_routing","location_based"]},{"id":"C082","deck":"05_VANET","priority":2,"front":"Cluster-based broadcast strategy.","back":"Nodes are grouped into clusters; elected cluster-heads forward packets.","tags":["broadcast_routing","cluster_based"]},{"id":"C083","deck":"06_Applications_Reordered","priority":1,"front":"Why data stream protocols?","back":"To transmit data from nodes to server, server to nodes, and between nodes; simple IoT data should not need heavy file/email protocols.","tags":["data_stream_protocols"]},{"id":"C084","deck":"06_Applications_Reordered","priority":1,"front":"Data stream protocols listed.","back":"MQTT, CoAP, HTTP, XMPP, AMQP.","tags":["data_stream_protocols","must_memorize"]},{"id":"C085","deck":"06_Applications_Reordered","priority":1,"front":"HTTP key idea.","back":"A well-understood application protocol for client-server data transfer; traverses firewalls/NAT easily because clients initiate connections.","tags":["HTTP"]},{"id":"C086","deck":"06_Applications_Reordered","priority":1,"front":"Common HTTP methods.","back":"GET read page, HEAD read header, POST append, PUT store, DELETE remove, TRACE echo, CONNECT proxy, OPTIONS query options.","tags":["HTTP","methods"]},{"id":"C087","deck":"06_Applications_Reordered","priority":1,"front":"MQTT definition.","back":"A lightweight client-server publish/subscribe messaging transport protocol, designed for high volumes of data in low-bandwidth networks.","tags":["MQTT","publish_subscribe","must_memorize"]},{"id":"C088","deck":"06_Applications_Reordered","priority":1,"front":"MQTT publish/subscribe model.","back":"Clients publish messages to topics; the broker forwards messages to clients subscribed to those topics.","tags":["MQTT","broker","topics"]},{"id":"C089","deck":"06_Applications_Reordered","priority":1,"front":"MQTT session stages.","back":"Connection, authentication, communication, termination.","tags":["MQTT","session"]},{"id":"C090","deck":"06_Applications_Reordered","priority":1,"front":"MQTT QoS services.","back":"At most once: PUBLISH. At least once: PUBLISH/PUBACK. Exactly once: PUBLISH/PUBREC and PUBREL/PUBCOMP.","tags":["MQTT","QoS","must_memorize"]},{"id":"C091","deck":"06_Applications_Reordered","priority":2,"front":"MQTT challenges.","back":"Scalability with tree/topic structure, interoperability because payloads are binary and app-specific, security requiring authentication and TLS.","tags":["MQTT","challenges"]},{"id":"C092","deck":"06_Applications_Reordered","priority":1,"front":"WebSockets definition.","back":"Application-layer protocol providing bidirectional full-duplex communication over a single TCP connection.","tags":["WebSockets","full_duplex"]},{"id":"C093","deck":"06_Applications_Reordered","priority":1,"front":"WebSockets key features.","back":"Bidirectional, full-duplex, single TCP connection, efficient implementation.","tags":["WebSockets"]},{"id":"C094","deck":"06_Applications_Reordered","priority":2,"front":"XML vs HTML.","back":"XML describes and focuses on what data is; HTML displays and focuses on how data looks.","tags":["XML","HTML"]},{"id":"C095","deck":"06_Applications_Reordered","priority":1,"front":"XMPP definition.","back":"Extensible Messaging and Presence Protocol: XML-based protocol for near-real-time exchange of structured extensible data.","tags":["XMPP","XML"]},{"id":"C096","deck":"06_Applications_Reordered","priority":1,"front":"XMPP model.","back":"Decentralized client-server architecture: clients do not talk directly, there is no central authoritative server, anyone can run a server.","tags":["XMPP","decentralized"]},{"id":"C097","deck":"06_Applications_Reordered","priority":2,"front":"XMPP implementation options.","back":"Originally XMPP on TCP; now many messages over HTTP; WebSockets are an alternative.","tags":["XMPP"]},{"id":"C098","deck":"06_Applications_Reordered","priority":1,"front":"Cloud computing definition.","back":"On-demand compute services over the Internet, including IaaS, PaaS, SaaS, and Security as a Service.","tags":["cloud","definition"]},{"id":"C099","deck":"06_Applications_Reordered","priority":2,"front":"Cloud deployment patterns.","back":"Public cloud and private cloud; public cloud may suffer from noisy-neighbor effects when services share hardware.","tags":["cloud","deployment"]},{"id":"C100","deck":"06_Applications_Reordered","priority":1,"front":"IoT cloud solution elements.","back":"Sensors collecting data, CPU/MCU processing locally, gateway facilitating communication, remote server receiving commands/data and providing analytics/visualization.","tags":["cloud","IoT"]},{"id":"C101","deck":"06_Applications_Reordered","priority":2,"front":"Cloud security: main idea.","back":"Computer security matters because attacks may be physical, financial, or reputational; use encryption and authentication between client/server.","tags":["cloud","security"]},{"id":"C102","deck":"06_Applications_Reordered","priority":1,"front":"Data analytics definition.","back":"Process of cleansing, transforming, and modeling data to discover useful information, suggest conclusions, and support decision-making.","tags":["analytics","definition"]},{"id":"C103","deck":"06_Applications_Reordered","priority":1,"front":"Steps in data analytics.","back":"Collection, ingestion, discovery \u0026 cleansing, integration, analysis, delivery.","tags":["analytics","pipeline","must_memorize"]},{"id":"C104","deck":"06_Applications_Reordered","priority":2,"front":"Challenges in data analytics.","back":"Bad/multitude sensor data, huge volume requiring decentralized/parallel processing, many attributes needing parsimonious models, real-time quick-vs-accurate tradeoff.","tags":["analytics","challenges"]},{"id":"C105","deck":"media_sampling_sourcecoding","priority":1,"front":"Aliasing definition.","back":"High frequencies appear as false lower frequencies after undersampling, making perfect reconstruction impossible.","tags":["sampling","aliasing","must_memorize"]},{"id":"C106","deck":"media_sampling_sourcecoding","priority":1,"front":"Why low-pass filter before sampling?","back":"To remove frequencies above Nyquist and prevent aliasing.","tags":["filtering","sampling","anti_aliasing"]},{"id":"C107","deck":"media_sampling_sourcecoding","priority":1,"front":"Quantization reversibility.","back":"Quantization is not reversible; rounding amplitudes into levels loses information.","tags":["quantization","lossy"]},{"id":"C108","deck":"media_sampling_sourcecoding","priority":1,"front":"Rate-distortion intuition.","back":"More bits/rate gives lower distortion and better quality; fewer bits gives higher distortion and smaller files.","tags":["rate_distortion","compression"]},{"id":"C109","deck":"media_sampling_sourcecoding","priority":1,"front":"Luminance vs chrominance.","back":"Luminance Y is brightness; chrominance Cb/Cr is color information.","tags":["images","YCbCr"]},{"id":"C110","deck":"media_sampling_sourcecoding","priority":1,"front":"Why compress chrominance more?","back":"The human eye is more sensitive to brightness than color, so chrominance can be reduced more with less perceived loss.","tags":["JPEG","chrominance"]},{"id":"C111","deck":"media_sampling_sourcecoding","priority":1,"front":"JPEG pipeline.","back":"RGB → YCbCr → blocks → DCT → quantization → entropy coding.","tags":["JPEG","DCT","must_memorize"]},{"id":"C112","deck":"media_sampling_sourcecoding","priority":1,"front":"What does DCT do?","back":"Represents image blocks as weighted sums of cosine frequency components, concentrating energy in low-frequency coefficients.","tags":["DCT","JPEG"]},{"id":"C113","deck":"media_sampling_sourcecoding","priority":1,"front":"Lossy step in JPEG.","back":"Quantization.","tags":["JPEG","quantization","must_memorize"]},{"id":"C114","deck":"media_sampling_sourcecoding","priority":1,"front":"Entropy coding idea.","back":"Lossless coding that gives short codes to frequent symbols and longer codes to rare symbols.","tags":["entropy_coding","compression"]},{"id":"C115","deck":"media_sampling_sourcecoding","priority":1,"front":"JPEG vs MPEG.","back":"JPEG compresses still images, mainly spatial redundancy. MPEG compresses video using spatial and temporal redundancy.","tags":["JPEG","MPEG"]},{"id":"C116","deck":"media_sampling_sourcecoding","priority":1,"front":"Inter-frame coding.","back":"Encodes a frame by predicting it from other frames and storing only differences/motion information.","tags":["MPEG","video"]},{"id":"C117","deck":"media_sampling_sourcecoding","priority":1,"front":"Motion estimation vs compensation.","back":"Motion estimation finds where blocks moved; motion compensation uses that motion to predict/reconstruct frames.","tags":["MPEG","motion"]},{"id":"C118","deck":"media_3D_graphs","priority":1,"front":"Point cloud.","back":"A set/sample of 3D points (x,y,z) representing the geometry of an object or scene.","tags":["3D","point_cloud"]},{"id":"C119","deck":"media_3D_graphs","priority":1,"front":"Graph signal.","back":"A value/function defined on each node of a graph.","tags":["graph_signal","graphs"]},{"id":"C120","deck":"media_3D_graphs","priority":1,"front":"Graph Fourier basis.","back":"The Laplacian eigenvectors play the role of Fourier basis functions on a graph.","tags":["graph_fourier","eigenvectors"]},{"id":"C121","deck":"media_3D_graphs","priority":1,"front":"Low vs high graph frequency.","back":"Low graph frequency: neighboring nodes similar. High graph frequency: neighboring nodes very different.","tags":["graph_fourier","frequency"]},{"id":"C122","deck":"media_3D_graphs","priority":1,"front":"PCA goal.","back":"Dimensionality reduction by keeping directions/components with largest variance.","tags":["PCA","dimension_reduction"]},{"id":"C123","deck":"media_3D_graphs","priority":1,"front":"PCA eigenvectors and eigenvalues.","back":"Eigenvectors are principal directions; eigenvalues measure variance explained along those directions.","tags":["PCA","eigenvectors"]}],"multiple_choice_cards":[{"id":"M001","deck":"formulas_sampling","priority":1,"question":"A signal has maximum frequency W = 5 kHz. What is the minimum sampling frequency?","choices":["5 kHz","10 kHz","2.5 kHz","10 Hz"],"answer":"10 kHz","explanation":"Nyquist says f_s ≥ 2W, so f_s ≥ 10 kHz.","tags":["sampling","nyquist"]},{"id":"M002","deck":"formulas_quantization","priority":1,"question":"If B = 8 bits, how many quantization levels are available?","choices":["8","16","128","256"],"answer":"256","explanation":"L = 2^B = 2^8 = 256.","tags":["quantization"]},{"id":"M003","deck":"04_Low_Power_Standards","priority":1,"question":"What happens when LoRa spreading factor increases?","choices":["Bitrate increases and range decreases","Bitrate decreases and sensitivity/range increase","Power consumption always becomes zero","The signal stops using chirps"],"answer":"Bitrate decreases and sensitivity/range increase","explanation":"Higher SF gives longer symbol time and better sensitivity, but lower throughput.","tags":["LoRa","spreading_factor"]},{"id":"M004","deck":"05_VANET","priority":1,"question":"Which MAC approach is used in wireless to avoid collisions?","choices":["CSMA/CD","CSMA/CA","FTP","DCT"],"answer":"CSMA/CA","explanation":"Wireless cannot reliably detect collisions, so it tries to avoid them.","tags":["CSMA","MAC"]},{"id":"M005","deck":"06_Applications_Reordered","priority":1,"question":"MQTT uses which communication model?","choices":["File transfer","Publish/subscribe","Only peer-to-peer","Batch-only upload"],"answer":"Publish/subscribe","explanation":"Clients publish to topics and subscribers receive messages via a broker.","tags":["MQTT"]},{"id":"M006","deck":"media_sampling_sourcecoding","priority":1,"question":"In JPEG, which step is lossy?","choices":["DCT","Quantization","Entropy coding","RGB to YCbCr only"],"answer":"Quantization","explanation":"DCT is a transform; entropy coding is lossless; quantization discards information.","tags":["JPEG","quantization"]},{"id":"M007","deck":"media_3D_graphs","priority":1,"question":"In graph Fourier transform, what plays the role of Fourier basis functions?","choices":["Laplacian eigenvectors","Only eigenvalues","MQTT topics","Quantization intervals"],"answer":"Laplacian eigenvectors","explanation":"The graph signal is expanded in the eigenvector basis of the graph Laplacian.","tags":["graph_fourier"]},{"id":"M008","deck":"03_SE_Communications","priority":1,"question":"If SNR increases, what generally happens to BER?","choices":["BER increases","BER decreases","BER becomes exactly 1","SNR has no relation to BER"],"answer":"BER decreases","explanation":"A stronger signal relative to noise makes bit errors less likely.","tags":["SNR","BER"]},{"id":"M009","deck":"05_VANET","priority":1,"question":"What is a broadcast storm?","choices":["A weather event affecting sensors","Excessive/redundant rebroadcasts causing contention and collisions","A LoRaWAN activation method","A JPEG compression artifact"],"answer":"Excessive/redundant rebroadcasts causing contention and collisions","explanation":"Broadcast storm is a major issue when many VANET nodes rebroadcast messages inefficiently.","tags":["broadcast_routing"]},{"id":"M010","deck":"01_SE_Intro","priority":1,"question":"Which list best matches the smart-environment data path?","choices":["DCT → quantization → entropy","Acquisition → local processing → communication → stream → storage/cloud → analytics","RTS → CTS → ACK only","SF7 → SF8 → SF12"],"answer":"Acquisition → local processing → communication → stream → storage/cloud → analytics","explanation":"This is the data path sequence from the intro slides.","tags":["data_path"]}],"cloze_cards":[{"id":"Z001","deck":"formulas_sampling","priority":1,"text":"Nyquist condition: f_s ≥ {{c1::2W}}.","answer":"2W","tags":["sampling"]},{"id":"Z002","deck":"formulas_quantization","priority":1,"text":"The quantization step size is {{c1::Δ}} = 2A / 2^B.","answer":"Δ","tags":["quantization"]},{"id":"Z003","deck":"formulas_graphs","priority":1,"text":"The graph Laplacian is L = {{c1::D - A}}.","answer":"D - A","tags":["graphs"]},{"id":"Z004","deck":"04_Low_Power_Standards","priority":1,"text":"LoRa uses {{c1::Chirp Spread Spectrum}} modulation.","answer":"Chirp Spread Spectrum","tags":["LoRa"]},{"id":"Z005","deck":"04_Low_Power_Standards","priority":1,"text":"LoRaWAN Class {{c1::A}} listens only after the end device transmits.","answer":"A","tags":["LoRaWAN"]},{"id":"Z006","deck":"05_VANET","priority":1,"text":"DSRC uses the {{c1::5.9 GHz}} band.","answer":"5.9 GHz","tags":["DSRC"]},{"id":"Z007","deck":"06_Applications_Reordered","priority":1,"text":"MQTT clients publish to {{c1::topics}} and a broker forwards messages to subscribers.","answer":"topics","tags":["MQTT"]},{"id":"Z008","deck":"media_sampling_sourcecoding","priority":1,"text":"JPEG pipeline: RGB → YCbCr → blocks → {{c1::DCT}} → quantization → entropy coding.","answer":"DCT","tags":["JPEG"]},{"id":"Z009","deck":"media_3D_graphs","priority":1,"text":"In PCA, eigenvalues represent {{c1::variance explained}} by each principal component.","answer":"variance explained","tags":["PCA"]},{"id":"Z010","deck":"03_SE_Communications","priority":1,"text":"Higher SNR generally means lower {{c1::BER}}.","answer":"BER","tags":["SNR"]}],"exam_sentences":["A smart environment monitors physical conditions, processes data, makes decisions, and acts on the environment.","IoT is a network of physical objects embedded with sensors, electronics, software, and connectivity so they can collect/exchange data and react to commands.","The smart-environment data path is data acquisition, local processing, communication, stream, storage/cloud, and analytics.","LPWAN combines long range with low power and low data rate for IoT applications.","LoRa is the chirp-spread-spectrum physical modulation, while LoRaWAN is the network protocol and architecture built on top.","Increasing LoRa spreading factor improves sensitivity/range but decreases bitrate and increases time-on-air.","Sigfox is proprietary, ultra-narrowband, low-throughput, subscription-based LPWAN.","VANETs are vehicular ad hoc networks supporting V2V and V2I communication for safety and traffic efficiency.","CSMA/CA avoids collisions before transmission and is preferred in wireless where collision detection is difficult.","Broadcast storm occurs when redundant rebroadcasts cause contention and collisions.","MQTT is a lightweight publish/subscribe protocol where clients publish to topics and a broker forwards to subscribers.","WebSockets provide bidirectional full-duplex communication over a single TCP connection.","XMPP is an XML-based decentralized client-server protocol for near-real-time structured data exchange.","Cloud computing provides on-demand compute services over the Internet: IaaS, PaaS, SaaS, and security as a service.","Data analytics cleanses, transforms, and models data to discover useful information and support decisions.","Fourier transform represents a signal as a weighted sum of complex sinusoids.","Aliasing means high frequencies appear as false lower frequencies after undersampling.","DCT represents image blocks as weighted sums of cosine frequency components.","Quantization is the lossy step in JPEG.","Graph Fourier transform represents graph signals using Laplacian eigenvectors."],"recommended_app_logic":{"session_length_minutes":10,"question_mix":{"formula_cards":0.3,"concept_cards":0.4,"multiple_choice_cards":0.2,"cloze_cards":0.1},"spaced_repetition_hint":{"wrong_answer":"repeat within 2 minutes","hesitant_answer":"repeat within 10 minutes","correct_answer":"repeat after 30-60 minutes","priority_1":"show twice as often as priority_2","priority_3":"show only after priority_1 and priority_2 are stable"},"ui_modes":["rapid_fire","type_formula","multiple_choice","fill_blank","explain_in_one_sentence"]},"questions":[{"id":"Q0001","deck":"01_SE_Intro","priority":1,"difficulty":"easy","type":"short_answer","prompt":"Define: Smart environment.","answer":"A physical environment enriched with sensors, actuators, communication, computation, and decision-making so it can monitor conditions, process data, decide, and act.","explanation":"Key idea: A physical environment enriched with sensors, actuators, communication, computation, and decision-making so it can monitor conditions, process data, decide, and act.","tags":["smart_environment","definition"]},{"id":"Q0002","deck":"0 ry operator ultra-narrowband service.","explanation":"LoRaWAN can use private gateways and LoRa modulation; Sigfox is proprietary operator ultra-narrowband service.","tags":["LPWAN"]},{"id":"Q0731","deck":"04_Low_Power_Standards","priority":1,"difficulty":"medium","type":"fill_blank","prompt":"LoRaWAN vs Sigfox: ______","answer":"LoRaWAN can use private gateways and LoRa modulation; Sigfox is proprietary operator ultra-narrowband service.","explanation":"Focus on the key difference.","tags":["LPWAN"]},{"id":"Q0732","deck":"05_VANET","priority":1,"difficulty":"hard","type":"short_answer","prompt":"Compare: CSMA/CD vs CSMA/CA.","answer":"CSMA/CD detects collisions after they occur; CSMA/CA avoids collisions before transmitting.","explanation":"CSMA/CD detects collisions after they occur; CSMA/CA avoids collisions before transmitting.","tags":["CSMA"]},{"id":"Q0733","deck":"05_VANET","priority":1,"difficulty":"medium","type":"fill_blank","prompt":"CSMA/CD vs CSMA/CA: ______","answer":"CSMA/CD detects collisions after they occur; CSMA/CA avoids collisions before transmitting.","explanation":"Focus on the key difference.","tags":["CSMA"]},{"id":"Q0734","deck":"05_VANET","priority":1,"difficulty":"hard","type":"short_answer","prompt":"Compare: Hidden terminal vs exposed terminal.","answer":"Hidden: nodes cannot hear each other but collide at receiver. Exposed: node unnecessarily stays silent although it would not collide.","explanation":"Hidden: nodes cannot hear each other but collide at receiver. Exposed: node unnecessarily stays silent although it would not collide.","tags":["wireless"]},{"id":"Q0735","deck":"05_VANET","priority":1,"difficulty":"medium","type":"fill_blank","prompt":"Hidden terminal vs exposed terminal: ______","answer":"Hidden: nodes cannot hear each other but collide at receiver. Exposed: node unnecessarily stays silent although it would not collide.","explanation":"Focus on the key difference.","tags":["wireless"]},{"id":"Q0736","deck":"06_Applications_Reordered","priority":1,"difficulty":"hard","type":"short_answer","prompt":"Compare: HTTP vs MQTT for IoT.","answer":"HTTP is request/response and broadly compatible; MQTT is lightweight publish/subscribe with broker/topics, better for low-bandwidth sensor messaging.","explanation":"HTTP is request/response and broadly compatible; MQTT is lightweight publish/subscribe with broker/topics, better for low-bandwidth sensor messaging.","tags":["MQTT","HTTP"]},{"id":"Q0737","deck":"06_Applications_Reordered","priority":1,"difficulty":"medium","type":"fill_blank","prompt":"HTTP vs MQTT for IoT: ______","answer":"HTTP is request/response and broadly compatible; MQTT is lightweight publish/subscribe with broker/topics, better for low-bandwidth sensor messaging.","explanation":"Focus on the key difference.","tags":["MQTT","HTTP"]},{"id":"Q0738","deck":"06_Applications_Reordered","priority":1,"difficulty":"hard","type":"short_answer","prompt":"Compare: MQTT QoS 0 vs QoS 1 vs QoS 2.","answer":"QoS0 at most once, QoS1 at least once, QoS2 exactly once.","explanation":"QoS0 at most once, QoS1 at least once, QoS2 exactly once.","tags":["MQTT"]},{"id":"Q0739","deck":"06_Applications_Reordered","priority":1,"difficulty":"medium","type":"fill_blank","prompt":"MQTT QoS 0 vs QoS 1 vs QoS 2: ______","answer":"QoS0 at most once, QoS1 at least once, QoS2 exactly once.","explanation":"Focus on the key difference.","tags":["MQTT"]},{"id":"Q0740","deck":"media_sampling_sourcecoding","priority":1,"difficulty":"hard","type":"short_answer","prompt":"Compare: JPEG vs MPEG.","answer":"JPEG compresses still images/spatial redundancy; MPEG compresses video/spatial and temporal redundancy.","explanation":"JPEG compresses still images/spatial redundancy; MPEG compresses video/spatial and temporal redundancy.","tags":["JPEG","MPEG"]},{"id":"Q0741","deck":"media_sampling_sourcecoding","priority":1,"difficulty":"medium","type":"fill_blank","prompt":"JPEG vs MPEG: ______","answer":"JPEG compresses still images/spatial redundancy; MPEG compresses video/spatial and temporal redundancy.","explanation":"Focus on the key difference.","tags":["JPEG","MPEG"]},{"id":"Q0742","deck":"media_3D_graphs","priority":1,"difficulty":"hard","type":"short_answer","prompt":"Compare: Graph Fourier vs PCA.","answer":"Graph Fourier analyzes signals on graph structures using Laplacian eigenvectors; PCA reduces data dimensions using covariance eigenvectors with largest variance.","explanation":"Graph Fourier analyzes signals on graph structures using Laplacian eigenvectors; PCA reduces data dimensions using covariance eigenvectors with largest variance.","tags":["graph_fourier","PCA"]},{"id":"Q0743","deck":"media_3D_graphs","priority":1,"difficulty":"medium","type":"fill_blank","prompt":"Graph Fourier vs PCA: ______","answer":"Graph Fourier analyzes signals on graph structures using Laplacian eigenvectors; PCA reduces data dimensions using covariance eigenvectors with largest variance.","explanation":"Focus on the key difference.","tags":["graph_fourier","PCA"]},{"id":"Q0744","deck":"media_sampling_sourcecoding","priority":1,"difficulty":"hard","type":"short_answer","prompt":"Compare: Lossless vs lossy compression.","answer":"Lossless recovers original exactly; lossy removes information and allows distortion for higher compression.","explanation":"Lossless recovers original exactly; lossy removes information and allows distortion for higher compression.","tags":["compression"]},{"id":"Q0745","deck":"media_sampling_sourcecoding","priority":1,"difficulty":"medium","type":"fill_blank","prompt":"Lossless vs lossy compression: ______","answer":"Lossless recovers original exactly; lossy removes information and allows distortion for higher compression.","explanation":"Focus on the key difference.","tags":["compression"]},{"id":"Q0746","deck":"formulas_sampling","priority":1,"difficulty":"hard","type":"identify_mistake","prompt":"A student says aliasing means low frequencies become high frequencies.","answer":"Aliasing is usually high frequencies appearing as false lower frequencies after undersampling.","explanation":"Aliasing folds high-frequency content into lower frequency range.","tags":["aliasing"]},{"id":"Q0747","deck":"formulas_sampling","priority":1,"difficulty":"hard","type":"identify_mistake","prompt":"A student writes Nyquist as f_s ≤ 2W.","answer":"The inequality direction is wrong. It should be f_s ≥ 2W.","explanation":"Sampling must be at least twice the highest frequency.","tags":["Nyquist"]},{"id":"Q0748","deck":"formulas_fourier","priority":1,"difficulty":"hard","type":"identify_mistake","prompt":"A student says Fourier transform decomposes a signal into squares.","answer":"It decomposes a signal into weighted complex sinusoids, not squares.","explanation":"Sinusoids are the basis functions.","tags":["Fourier"]},{"id":"Q0749","deck":"formulas_quantization","priority":1,"difficulty":"hard","type":"identify_mistake","prompt":"A student says increasing B increases Δ.","answer":"Wrong: increasing B increases L=2^B, so Δ=2A/L decreases.","explanation":"More bits give finer steps.","tags":["quantization"]},{"id":"Q0750","deck":"formulas_quantization","priority":1,"difficulty":"hard","type":"identify_mistake","prompt":"A student says MSE≈12Δ².","answer":"Wrong: for uniform quantization MSE≈Δ²/12.","explanation":"The 12 is in the denominator.","tags":["MSE"]},{"id":"Q0751","deck":"formulas_rate_distortion","priority":1,"difficulty":"hard","type":"identify_mistake","prompt":"A student says decreasing D requires fewer bits.","answer":"Wrong: lower distortion requires more bits/rate.","explanation":"B≈1/2 log2(σ²/D), so smaller D raises B.","tags":["rate_distortion"]},{"id":"Q0752","deck":"04_Low_Power_Standards","priority":1,"difficulty":"hard","type":"identify_mistake","prompt":"A student says LoRaWAN is the physical chirp modulation.","answer":"Wrong: LoRa is the physical chirp modulation; LoRaWAN is the network/MAC protocol.","explanation":"This ia_3D_graphs","priority":1,"difficulty":"medium","type":"short_answer","prompt":"Explain why 'Graph frequency' matters in this course.","answer":"It is central because: Eigenvalues represent graph frequencies; low means smooth, high means rapid variation over edges.","explanation":"Connect the concept to smart environments/media processing.","tags":["graph_fourier"]},{"id":"Q0979","deck":"media_3D_graphs","priority":1,"difficulty":"hard","type":"short_answer","prompt":"Give one realistic example involving Graph frequency.","answer":"Example: use Graph frequency in an IoT/media/smart-environment system according to its definition: Eigenvalues represent graph frequencies; low means smooth, high means rapid variation over edges.","explanation":"Any correct example should match the concept.","tags":["graph_fourier"]},{"id":"Q0980","deck":"media_3D_graphs","priority":1,"difficulty":"medium","type":"short_answer","prompt":"Explain why 'PCA' matters in this course.","answer":"It is central because: Dimensionality reduction by keeping directions with largest variance.","explanation":"Connect the concept to smart environments/media processing.","tags":["PCA"]},{"id":"Q0981","deck":"media_3D_graphs","priority":1,"difficulty":"hard","type":"short_answer","prompt":"Give one realistic example involving PCA.","answer":"Example: use PCA in an IoT/media/smart-environment system according to its definition: Dimensionality reduction by keeping directions with largest variance.","explanation":"Any correct example should match the concept.","tags":["PCA"]},{"id":"Q0982","deck":"media_3D_graphs","priority":1,"difficulty":"medium","type":"short_answer","prompt":"Explain why 'PCA eigenvalues' matters in this course.","answer":"It is central because: Eigenvalues measure variance explained by each principal component.","explanation":"Connect the concept to smart environments/media processing.","tags":["PCA"]},{"id":"Q0983","deck":"media_3D_graphs","priority":1,"difficulty":"hard","type":"short_answer","prompt":"Give one realistic example involving PCA eigenvalues.","answer":"Example: use PCA eigenvalues in an IoT/media/smart-environment system according to its definition: Eigenvalues measure variance explained by each principal component.","explanation":"Any correct example should match the concept.","tags":["PCA"]},{"id":"Q0984","deck":"formulas_sampling","priority":1,"difficulty":"expert","type":"short_answer","prompt":"Why is low-pass filtering before sampling not optional when high-frequency content exists?","answer":"Without removing content above W before sampling, frequencies above Nyquist can fold into lower frequencies as aliasing, so reconstruction cannot recover the original.","explanation":"Without removing content above W before sampling, frequencies above Nyquist can fold into lower frequencies as aliasing, so reconstruction cannot recover the original.","tags":["sampling","filtering"]},{"id":"Q0985","deck":"formulas_sampling","priority":1,"difficulty":"expert","type":"short_answer","prompt":"Sampling increases data discreteness in which dimension?","answer":"Time/space becomes discrete; amplitude is not necessarily discrete until quantization.","explanation":"Time/space becomes discrete; amplitude is not necessarily discrete until quantization.","tags":["sampling"]},{"id":"Q0986","deck":"formulas_quantization","priority":1,"difficulty":"expert","type":"short_answer","prompt":"Quantization increases data discreteness in which dimension?","answer":"Amplitude/value becomes discrete by mapping continuous values into finite levels.","explanation":"Amplitude/value becomes discrete by mapping continuous values into finite levels.","tags":["quantization"]},{"id":"Q0987","deck":"formulas_quantization","priority":1,"difficulty":"expert","type":"short_answer","prompt":"Why does MSE depend on Δ² instead of just Δ?","answer":"MSE is an expected squared error; if quantization step doubles, error scale doubles and squared error grows about four times.","explanation":"MSE is an expected squared error; if quantization step doubles, error scale doubles and squared error grows about four times.","tags":["MSE"]},{"id":"Q0988","deck":"formulas_rate_distortion","priority":1,"difficulty":"expert","type":"short_answer","prompt":"What is the operational meaning of rate-distortion?","answer":"It describes the tradeoff between number of bits used and reconstruction error/distortion.","explanation":"It describes the tradeoff between number of bits used and reconstruction error/distortion.","tags":["rate_distortion"]},{"id":"Q0989","deck":"media_sampling_sourcecoding","priority":1,"difficulty":"expert","type":"short_answer","prompt":"Why is DCT useful for JPEG compression?","answer":"It concentrates most image energy in low-frequency coefficients, letting high-frequency coefficients be quantized more aggressively.","explanation":"It concentrates most image energy in low-frequency coefficients, letting high-frequency coefficients be quantized more aggressively.","tags":["DCT","JPEG"]},{"id":"Q0990","deck":"media_sampling_sourcecoding","priority":1,"difficulty":"expert","type":"short_answer","prompt":"Why can MPEG compress video more than independent JPEG frames?","answer":"It exploits temporal redundancy between frames through prediction/motion compensation, not only spatial redundancy.","explanation":"It exploits temporal redundancy between frames through prediction/motion compensation, not only spatial redundancy.","tags":["MPEG"]},{"id":"Q0991","deck":"media_3D_graphs","priority":1,"difficulty":"expert","type":"short_answer","prompt":"Why does increasing Z shrink image projection in the pinhole camera model?","answer":"x=fX/Z and y=fY/Z; Z is in the denominator, so larger depth reduces projected coordinates/size.","explanation":"x=fX/Z and y=fY/Z; Z is in the denominator, so larger depth reduces projected coordinates/size.","tags":["camera"]},{"id":"Q0992","deck":"media_3D_graphs","priority":1,"difficulty":"expert","type":"short_answer","prompt":"Why divide LiDAR time-of-flight distance by 2?","answer":"The measured time is for the light going to the object and returning, so one-way distance is half the round-trip.","explanation":"The measured time is for the light going to the object and returning, so one-way distance is half the round-trip.","tags":["LiDAR"]},{"id":"Q0993","deck":"media_3D_graphs","priority":1,"difficulty":"expert","type":"short_answer","prompt":"Why are graph Fourier eigenvectors like sinusoids?","answer":"They form basis patterns adapted to the graph structure, analogous to sinusoidal bases for regular time signals.","explanation":"They form basis patterns adapted to the graph structure, analogous to sinusoidal bases for regular time signals.","tags":["graph_fourier"]},{"id":"Q0994","deck":"media_3D_graphs","priority":1,"difficulty":"expert","type":"short_answer","prompt":"Why are PCA components with small eigenvalues usually discarded?","answer":"They explain little variance and often correspond to less informative/noisier directions.","explanation":"They explain little variance and often correspond to less informative/noisier directions.","tags":["PCA"]},{"id":"Q0995","deck":"04_Low_Power_Standards","priority":1,"difficulty":"expert","type":"short_answer","prompt":"Why is higher SF not always better in LoRa?","answer":"Although it improves range/sensitivity, it increases time-on-air, lowers bitrate, consumes more airtime, and can increase collision risk.","explanation":"Although it improves range/sensitivity, it increases time-on-air, lowers bitrate, consumes more airtime, and can increase collision risk.","tags":["LoRa","SF"]},{"id":"Q0996","deck":"04_Low_Power_Standards","priority":1,"difficulty":"expert","type":"short_answer","prompt":"Why does LoRaWAN Class A save energy?","answer":"The radio is mostly asleep and opens receive windows only after the device sends an uplink.","explanation":"The radio is mostly asleep and opens receive windows only after the device sends an uplink.","tags":["LoRaWAN"]},{"id":"Q0997","deck":"05_VANET","priority":1,"difficulty":"expert","type":"short_answer","prompt":"Why are VANET routes unstable?","answer":"Vehicles move quickly and topology changes rapidly, even if motion is constrained by roads.","explanation":"Vehicles move quickly and topology changes rapidly, even if motion is constrained by roads.","tags":["VANET"]},{"id":"Q0998","deck":"05_VANET","priority":1,"difficulty":"expert","type":"short_answer","prompt":"Why is broadcast important for VANET safety?","answer":"Safety alerts must quickly reach many nearby vehicles, often without knowing specific destinations.","explanation":"Safety alerts must quickly reach many nearby vehicles, often without knowing specific destinations.","tags":["VANET","broadcast"]},{"id":"Q0999","deck":"06_Applications_Reordered","priority":1,"difficulty":"expert","type":"short_answer","prompt":"Why can MQTT be better than HTTP for sensor telemetry?","answer":"MQTT is lightweight, topic-based publish/subscribe, and avoids repeated heavy request/response overhead for many subscribers.","explanation":"MQTT is lightweight, topic-based publish/subscribe, and avoids repeated heavy request/response overhead for many subscribers.","tags":["MQTT","HTTP"]},{"id":"Q1000","deck":"06_Applications_Reordered","priority":1,"difficulty":"expert","type":"short_answer","prompt":"Why are data analytics needed after storage/cloud?","answer":"Raw IoT data must be cleaned, integrated, modeled, and delivered to support decisions.","explanation":"Raw IoT data must be cleaned, integrated, modeled, and delivered to support decisions.","tags":["analytics"]}],"imported_question_bank":{"source_file":"se_exam_sprint_questions_1000_final.json","imported_count":1000,"title":"SE Exam Sprint Question Bank v3","version":"3.0"}},"./data/economics_computation_exam_questions.json":{"metadata":{"title":"Economics and Computation Exam Quiz Data","version":"1.0","created_for":"Exam Sprint","stu
